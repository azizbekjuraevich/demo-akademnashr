<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <title>Aylanuvchi Gradient Fon</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      /* Gradientni fon sifatida beramiz */
      background: conic-gradient(from 0deg, red, black, blue, red);
      animation: rotateGradient 10s linear infinite;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-family: Arial, sans-serif;
    }

    h1 {
      font-size: 3em;
      text-shadow: 2px 2px 5px black;
    }

    /* Gradientni aylantirish */
    @keyframes rotateGradient {
      0% {
        background: conic-gradient(from 0deg, red, black, blue, red);
      }
      100% {
        background: conic-gradient(from 360deg, red, black, blue, red);
      }
    }
  </style>
</head>
<body>
  <h1>Aylanuvchi Qora Markaz!</h1>
</body>
</html>
